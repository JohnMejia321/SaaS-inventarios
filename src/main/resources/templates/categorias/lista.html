<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Categorías - Sistema de Inventario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f5f6fa; }
        .sidebar { min-height: 100vh; background: linear-gradient(180deg, #2c3e50 0%, #1a252f 100%); }
        .card { border: none; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); }
        .nav-link { color: rgba(255,255,255,0.8); padding: 12px 20px; margin: 4px 0; border-radius: 8px; }
        .nav-link:hover, .nav-link.active { background-color: rgba(255,255,255,0.15); color: #fff; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <div class="col-md-2 sidebar p-0">
                <div class="p-3 text-center border-bottom border-secondary">
                    <h5 class="text-white mb-0"><i class="fas fa-boxes me-2"></i>Inventario</h5>
                    <small class="text-white-50">Sistema SaaS</small>
                </div>
                <nav class="nav flex-column p-2">
                    <a class="nav-link" th:href="@{/dashboard}"><i class="fas fa-home me-2"></i> Dashboard</a>
                    <a class="nav-link" th:href="@{/productos}"><i class="fas fa-box me-2"></i> Productos</a>
                    <a class="nav-link" th:href="@{/productos/inventario}"><i class="fas fa-warehouse me-2"></i> Inventario</a>
                    <a class="nav-link" th:href="@{/ventas}"><i class="fas fa-cash-register me-2"></i> Ventas</a>
                    <a class="nav-link" th:href="@{/ventas/nueva}"><i class="fas fa-plus-circle me-2"></i> Nueva Venta</a>
                    <a class="nav-link active" th:href="@{/categorias}"><i class="fas fa-tags me-2"></i> Categorías</a>
                    <hr class="border-secondary">
                    <a class="nav-link" href="#" onclick="logout()"><i class="fas fa-sign-out-alt me-2"></i> Cerrar Sesión</a>
                </nav>
            </div>

            <!-- Contenido principal -->
            <div class="col-md-10 p-4">
                <h2 class="mb-4"><i class="fas fa-tags me-2"></i>Categorías</h2>

                <!-- Formulario para nueva categoría -->
                <div class="card mb-4">
                    <div class="card-header bg-primary text-white">
                        <h5 class="mb-0">Nueva Categoría</h5>
                    </div>
                    <div class="card-body">
                        <form th:action="@{/categorias/guardar}" th:object="${categoria}" method="post">
                            <div class="row">
                                <div class="col-md-5">
                                    <input type="text" class="form-control" th:field="*{nombre}" 
                                           placeholder="Nombre de la categoría" required>
                                </div>
                                <div class="col-md-5">
                                    <input type="text" class="form-control" th:field="*{descripcion}" 
                                           placeholder="Descripción (opcional)">
                                </div>
                                <div class="col-md-2">
                                    <button type="submit" class="btn btn-success w-100">
                                        <i class="fas fa-plus me-2"></i>Agregar
                                    </button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>

                <!-- Lista de categorías -->
                <div class="card">
                    <div class="card-body">
                        <table class="table table-hover">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Nombre</th>
                                    <th>Descripción</th>
                                    <th>Estado</th>
                                    <th>Acciones</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="categoria : ${categorias}">
                                    <td th:text="${categoria.id}"></td>
                                    <td class="fw-bold" th:text="${categoria.nombre}"></td>
                                    <td th:text="${categoria.descripcion}">-</td>
                                    <td>
                                        <span class="badge bg-success" th:if="${categoria.estaActiva}">Activa</span>
                                        <span class="badge bg-secondary" th:unless="${categoria.estaActiva}">Inactiva</span>
                                    </td>
                                    <td>
                                        <a th:href="@{/categorias/eliminar/{id}(id=${categoria.id})}" 
                                           class="btn btn-sm btn-danger"
                                           onclick="return confirm('¿Está seguro de eliminar esta categoría?')">
                                            <i class="fas fa-trash"></i>
                                        </a>
                                    </td>
                                </tr>
                            </tbody>
                        </table>

                        <div th:if="${categorias.empty}" class="text-center py-5">
                            <i class="fas fa-tags fa-4x text-muted"></i>
                            <p class="mt-3 text-muted">No hay categorías registradas</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script>
        // Función de logout
        function logout() {
            window.location.href = '/logout';
        }
    </script>
</body>
</html>
