# ===============================
# Configuración de la Aplicación
# ===============================
spring.application.name=Sistema SaaS de Inventario

# ===============================
# Configuración de Puerto
# ===============================
server.port=8080

# ===============================
# Configuración de H2 Database (Memoria)
# ===============================
spring.datasource.url=jdbc:h2:mem:saas_inventory
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# ===============================
# Configuración de Consola H2
# ===============================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# ===============================
# Configuración de JPA/Hibernate
# ===============================
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=create-drop

# ===============================
# Configuración de Thymeleaf
# ===============================
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8

# ===============================
# Configuración de Mensajes
# ===============================
spring.messages.encoding=UTF-8

# ===============================
# Inicialización de Datos (después de crear tablas)
# ===============================
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:data.sql

# ===============================
# Configuración de JWT
# ===============================
jwt.secret=YXBsaWNhY2lvbnNhdXNlY3JldGZvcndlYmFwcGxpY2F0aW9uMjAyNQ==
jwt.expiration=86400000

# ===============================
# Configuración de Seguridad
# ===============================
spring.security.user.name=admin
spring.security.user.password=admin

# ===============================
# Configuración de Impresora Térmica POS
# ===============================
# IP de la impresora térmica (Epson TM, Star Micronics, etc.)
printer.thermal.address=192.168.1.100
# Puerto estándar ESC/POS
printer.thermal.port=9100
# Ancho del papel (58mm o 80mm)
printer.thermal.paper-width=48
# Nombre de la tienda para el tiquete
printer.thermal.store-name=Mi Tienda S.A.S.
printer.thermal.store-nit=123456789-0
printer.thermal.store-address=Calle Principal #1
printer.thermal.store-phone=300 1234567
